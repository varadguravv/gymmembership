<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login | Gym Management</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}"/>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-icon">
      <i class="bi bi-lightning-charge-fill"></i>
    </div>
    <h4 class="text-center mb-1">Welcome Back</h4>
    <p class="text-center text-muted mb-4" style="font-size:.9rem;">Sign in to Gym Management System</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
    <div class="alert alert-{{ category }} d-flex align-items-center gap-2 py-2" role="alert">
      <i class="bi bi-exclamation-triangle-fill"></i>
      <span>{{ message }}</span>
    </div>
    {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0">
            <i class="bi bi-envelope text-muted"></i>
          </span>
          <input type="email" name="email" class="form-control border-start-0 ps-0"
                 placeholder="admin@gym.com" required autofocus/>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0">
            <i class="bi bi-lock text-muted"></i>
          </span>
          <input type="password" name="password" id="passwordInput"
                 class="form-control border-start-0 ps-0" placeholder="••••••••" required/>
          <button type="button" class="input-group-text bg-light"
                  onclick="togglePw()" title="Show/Hide">
            <i class="bi bi-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-login w-100">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>
    </form>

    <p class="text-center text-muted mt-4 mb-0" style="font-size:.78rem;">
      <i class="bi bi-shield-lock me-1"></i>Secured Admin Portal
    </p>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePw() {
  const inp = document.getElementById('passwordInput');
  const icon = document.getElementById('eyeIcon');
  if (inp.type === 'password') {
    inp.type = 'text';
    icon.className = 'bi bi-eye-slash';
  } else {
    inp.type = 'password';
    icon.className = 'bi bi-eye';
  }
}
</script>
</body>
</html>
